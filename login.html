<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scolaris — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111214; --bg-card:#18191f; --border:#1e2026; --border-2:#2a2d35;
  --text:#e8e8e8; --text-muted:#44484f; --text-sub:#555b66;
  --accent:#6366f1; --accent-2:#8b5cf6;
}
[data-theme="light"] {
  --bg:#f4f4f6; --bg-card:#fff; --border:#e4e4e8; --border-2:#d0d0d8;
  --text:#111; --text-muted:#bbb; --text-sub:#aaa;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh;
  display:grid; place-items:center;
  padding:16px;
}

/* CARD */
.card {
  background:var(--bg-card);
  border:1px solid var(--border-2);
  border-radius:20px;
  padding:40px 36px;
  width:100%; max-width:400px;
}

/* LOGO */
.logo-wrap {
  display:flex; align-items:center; gap:12px;
  margin-bottom:32px; justify-content:center;
}
.logo {
  width:44px; height:44px; border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid; place-items:center; font-size:22px; flex-shrink:0;
}
.logo-name { font-size:22px; font-weight:900; letter-spacing:-.4px; }

/* TABS */
.tabs {
  display:flex; gap:4px; margin-bottom:28px;
  background:var(--bg); border-radius:12px; padding:4px;
}
.tab {
  flex:1; padding:9px; border:none; border-radius:9px;
  background:transparent; font-family:inherit; font-size:13px;
  font-weight:700; color:var(--text-sub); cursor:pointer;
  transition:all .15s;
}
.tab.active {
  background:var(--bg-card); color:var(--text);
  box-shadow:0 1px 6px rgba(0,0,0,.25);
}

/* CHAMPS */
.field { margin-bottom:16px; }
.label {
  display:block; font-size:11px; font-weight:700;
  color:var(--text-sub); text-transform:uppercase;
  letter-spacing:.6px; margin-bottom:6px;
}
.input {
  width:100%; padding:12px 16px;
  border:1.5px solid var(--border); border-radius:10px;
  background:var(--bg); color:var(--text);
  font-family:inherit; font-size:15px; outline:none;
  transition:border-color .15s;
}
.input:focus { border-color:var(--accent); }
.input::placeholder { color:var(--text-muted); }

/* RÈGLES PSEUDO */
.rules {
  font-size:11px; color:var(--text-sub);
  margin-top:-8px; margin-bottom:14px; line-height:1.5;
}

/* ERREUR */
.error {
  font-size:12px; color:#f87171;
  min-height:18px; margin-bottom:10px;
  text-align:center;
}

/* BOUTONS */
.btn-primary {
  width:100%; padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff; border:none; border-radius:10px;
  font-family:inherit; font-size:15px; font-weight:800;
  cursor:pointer; transition:opacity .15s;
  letter-spacing:-.2px;
}
.btn-primary:hover { opacity:.88; }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }

.sep { text-align:center; font-size:12px; color:var(--text-sub); margin:18px 0; }

.btn-guest {
  width:100%; padding:12px;
  background:transparent; color:var(--text-sub);
  border:1.5px solid var(--border); border-radius:10px;
  font-family:inherit; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s;
}
.btn-guest:hover { border-color:var(--border-2); color:var(--text); }

/* INFO INVITÉ */
.guest-info {
  font-size:11px; color:var(--text-sub);
  text-align:center; margin-top:12px; line-height:1.5;
}

/* THEME TOGGLE */
.theme-btn {
  position:fixed; top:16px; right:16px;
  border:1px solid var(--border); border-radius:8px;
  padding:6px 12px; background:transparent;
  color:var(--text-sub); font-family:inherit;
  font-size:12px; font-weight:600; cursor:pointer;
  transition:all .15s;
}
.theme-btn:hover { border-color:var(--border-2); color:var(--text); }

/* CHAMP CACHÉ */
.hidden { display:none !important; }

/* DIAGNOSTIC */
.diag {
  margin-top:14px; padding:10px 12px; border-radius:8px;
  font-size:11px; font-family:ui-monospace,monospace;
  background:rgba(99,102,241,0.08); border:1px solid var(--border);
  color:var(--text-sub); line-height:1.5;
}
.diag.ok    { background:rgba(34,197,94,0.10);  border-color:rgba(34,197,94,0.4);  color:#86efac; }
.diag.warn  { background:rgba(245,158,11,0.10); border-color:rgba(245,158,11,0.4); color:#fbbf24; }
.diag.fail  { background:rgba(239,68,68,0.10);  border-color:rgba(239,68,68,0.4);  color:#fca5a5; }
.diag-row   { display:flex; justify-content:space-between; gap:8px; }
.diag-key   { opacity:0.75; }
.diag-val   { font-weight:700; }
</style>
</head>
<body>

<button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀ Mode clair</button>

<div class="card">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo">📐</div>
    <div class="logo-name">Scolaris</div>
  </div>

  <!-- Tabs (Inscription par défaut : priorité à la création de compte) -->
  <div class="tabs">
    <button class="tab"        id="tab-login"    onclick="switchTab('login')">Connexion</button>
    <button class="tab active" id="tab-register" onclick="switchTab('register')">Inscription</button>
  </div>

  <!-- Champs -->
  <div class="field">
    <label class="label">Identifiant</label>
    <input class="input" id="username" type="text"
      placeholder="ton_pseudo" autocomplete="username"
      maxlength="20" spellcheck="false">
  </div>

  <div class="field" id="field-rules-wrap">
    <p class="rules" id="rules-text" style="display:none">
      Lettres, chiffres et _ uniquement · 3 à 20 caractères
    </p>
  </div>

  <div class="field">
    <label class="label">Mot de passe</label>
    <input class="input" id="password" type="password"
      placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="field" id="field-confirm">
    <label class="label">Confirmer le mot de passe</label>
    <input class="input" id="confirm" type="password" placeholder="••••••••">
  </div>

  <div class="error" id="error-msg"></div>

  <button class="btn-primary" id="btn-submit" onclick="handleAuth()">
    S'inscrire
  </button>

  <div class="sep">— ou —</div>

  <button class="btn-guest" onclick="continuerInvite()">
    Continuer en invité →
  </button>

  <p class="guest-info">
    En invité, les scores ne sont pas sauvegardés en ligne
  </p>

  <!-- Diagnostic visible : on ne reste plus aveugle si quelque chose plante -->
  <div class="diag" id="diag">
    <div class="diag-row"><span class="diag-key">Module Supabase</span><span class="diag-val" id="diag-mod">…</span></div>
    <div class="diag-row"><span class="diag-key">Session</span><span class="diag-val" id="diag-sess">…</span></div>
    <div class="diag-row" id="diag-err-row" style="display:none;"><span class="diag-key">Dernière erreur</span><span class="diag-val" id="diag-err">—</span></div>
  </div>
</div>

<script>
/* ── Thème ── */
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = dark ? '🌙 Mode sombre' : '☀ Mode clair';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('theme-btn').textContent =
    savedTheme === 'light' ? '🌙 Mode sombre' : '☀ Mode clair';
}

/* ── Tabs (par défaut : inscription) ── */
let activeTab = 'register';
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('field-confirm').classList.toggle('hidden', tab === 'login');
  document.getElementById('rules-text').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('btn-submit').textContent = tab === 'login' ? 'Se connecter' : "S'inscrire";
  document.getElementById('error-msg').textContent = '';
  document.getElementById('password').autocomplete =
    tab === 'login' ? 'current-password' : 'new-password';
}
// Force l'état initial cohérent avec activeTab='register'
switchTab('register');

/* ── Invité ── */
function continuerInvite() {
  sessionStorage.setItem('scolaris_guest', '1');
  location.href = 'index.html';
}

/* ── Entrée clavier ── */
['username','password','confirm'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuth();
  });
});
</script>

<script type="module">
let supabase, signIn, signUp, getCurrentUser;
let _authReady = false;

/* ── Diagnostic helpers ─────────────────────────────────── */
const diagEl    = document.getElementById('diag');
const diagMod   = document.getElementById('diag-mod');
const diagSess  = document.getElementById('diag-sess');
const diagErrRow = document.getElementById('diag-err-row');
const diagErr   = document.getElementById('diag-err');
function setDiag(field, value, severity) {
  if (field === 'mod')  diagMod.textContent  = value;
  if (field === 'sess') diagSess.textContent = value;
  if (field === 'err' && value) {
    diagErrRow.style.display = '';
    diagErr.textContent = value;
  }
  if (severity) diagEl.className = 'diag ' + severity;
}
setDiag('mod', 'chargement…', 'warn');
setDiag('sess', '—');

/* handleAuth défini IMMÉDIATEMENT (avant tout await), pour qu'un clic
   précoce ne soit jamais muet — il affiche au pire un message clair. */
window.handleAuth = async () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('btn-submit');

  errEl.textContent = '';

  if (!_authReady) {
    errEl.textContent = 'Service de comptes indisponible — voir le panneau Diagnostic ci-dessous.';
    return;
  }

  /* Validations front */
  if (!username || !password) {
    errEl.textContent = 'Remplis tous les champs.'; return;
  }
  if (activeTab === 'register') {
    if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
      errEl.textContent = 'Identifiant invalide (lettres, chiffres, _, 3–20 caractères).'; return;
    }
    if (password.length < 4) {
      errEl.textContent = 'Mot de passe trop court (4 caractères minimum).'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Les mots de passe ne correspondent pas.'; return;
    }
  }

  btn.disabled = true;
  btn.textContent = '…';

  try {
    if (activeTab === 'login') {
      await signIn(username, password);
    } else {
      await signUp(username, password);
    }
    location.href = 'index.html';
  } catch (e) {
    const msg = (e && e.message) || String(e);
    console.error('[login] auth error:', e);
    setDiag('err', msg, 'fail');
    const lower = msg.toLowerCase();
    if (lower.includes('email not confirmed') || lower.includes('confirmation'))
      errEl.textContent = 'Compte non confirmé. → Dans Supabase → Auth → Sign In/Up : décoche « Confirm email ».';
    else if (lower.includes('email') && (lower.includes('disabled') || lower.includes('not enabled') || lower.includes('signup')))
      errEl.textContent = 'Inscriptions désactivées. → Dans Supabase → Auth → Providers → Email : activer « Enable email signup ».';
    else if (lower.includes('email') && lower.includes('invalid'))
      errEl.textContent = 'Supabase refuse le format d\'email interne. → Auth → Settings : autoriser les emails non-vérifiés / désactiver la validation d\'email.';
    else if (msg.includes('Invalid login credentials'))
      errEl.textContent = 'Identifiant ou mot de passe incorrect (ou compte non confirmé côté Supabase).';
    else if (msg.includes('already registered') || msg.includes('already been registered'))
      errEl.textContent = 'Cet identifiant est déjà pris.';
    else if (msg.includes('23505') || msg.includes('duplicate'))
      errEl.textContent = 'Cet identifiant est déjà utilisé.';
    else if (lower.includes('fetch') || lower.includes('network') || lower.includes('failed to fetch'))
      errEl.textContent = 'Réseau injoignable. Vérifie ta connexion ou que le projet Supabase n\'est pas en pause.';
    else if (lower.includes('jwt') || lower.includes('401') || lower.includes('unauthorized') || lower.includes('api key'))
      errEl.textContent = 'Clé Supabase rejetée. → Régénère la clé publishable et mets-la dans auth/supabase.js.';
    else
      errEl.textContent = msg;
  } finally {
    btn.disabled = false;
    btn.textContent = activeTab === 'login' ? 'Se connecter' : "S'inscrire";
  }
};

/* ── Chargement du module Supabase ──────────────────────── */
try {
  const mod = await import('./auth/supabase.js');
  supabase       = mod.supabase;
  signIn         = mod.signIn;
  signUp         = mod.signUp;
  getCurrentUser = mod.getCurrentUser;
  _authReady = true;
  setDiag('mod', 'chargé ✓', 'ok');
} catch (e) {
  console.warn('[login] Supabase indisponible.', e && e.message);
  // ⚠ On NE désactive PLUS le bouton — clic possible → message clair.
  setDiag('mod', 'échec ✗', 'fail');
  setDiag('err', (e && e.message) || String(e), 'fail');
}

/* Déjà connecté → hub directement */
if (_authReady) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      setDiag('sess', 'connecté → redirection', 'ok');
      location.href = 'index.html';
    } else {
      setDiag('sess', 'aucune', 'ok');
    }
  } catch (e) {
    setDiag('sess', 'erreur', 'fail');
    setDiag('err', (e && e.message) || String(e), 'fail');
  }

  // Pré-diagnostic : on lit la config publique du projet Supabase pour détecter
  // les pièges classiques AVANT que l'utilisateur clique.
  try {
    const url = (supabase.supabaseUrl || '').replace(/\/$/, '') + '/auth/v1/settings';
    const r = await fetch(url, { headers: { apikey: supabase.supabaseKey || '' } });
    if (r.ok) {
      const cfg = await r.json();
      const probs = [];
      if (cfg.disable_signup) probs.push('inscriptions désactivées (Auth → Sign In/Up : « Allow new users to sign up »)');
      if (cfg.mailer_autoconfirm === false) probs.push('confirmation email requise (Auth → Sign In/Up : décoche « Confirm email »)');
      if (cfg.external && cfg.external.email === false) probs.push('provider Email désactivé (Auth → Providers → Email : activer)');
      if (probs.length) {
        setDiag('mod', 'chargé ✓ mais config problématique', 'warn');
        setDiag('err', '⚠ ' + probs.join(' • '), 'warn');
      }
    } else if (r.status === 401 || r.status === 403) {
      setDiag('mod', 'chargé ✓ mais clé refusée', 'fail');
      setDiag('err', 'HTTP ' + r.status + ' — clé publishable rejetée par le projet Supabase', 'fail');
    }
  } catch (e) { /* pré-diag best-effort : on ne casse rien si ça échoue */ }
}
</script>

</body>
</html>
