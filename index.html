<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scolaris — Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── Variables ── */
        :root {
            --bg:        #111214;
            --bg-card:   #18191f;
            --bg-hero:   #111214;
            --border:    #1e2026;
            --border-2:  #2a2d35;
            --text:      #e8e8e8;
            --text-muted:#44484f;
            --text-sub:  #555b66;
            --badge-bg:  #222430;
            --badge-txt: #555;
            --nav-bg:    #111214;
        }
        [data-theme="light"] {
            --bg:        #f4f4f6;
            --bg-card:   #ffffff;
            --bg-hero:   #ffffff;
            --border:    #e4e4e8;
            --border-2:  #d0d0d8;
            --text:      #111;
            --text-muted:#bbb;
            --text-sub:  #aaa;
            --badge-bg:  #f0f0f4;
            --badge-txt: #999;
            --nav-bg:    #ffffff;
        }

        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }
        a { text-decoration: none; color: inherit; }

        /* ── Navbar ── */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 32px; height: 56px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 200;
            transition: background 0.2s, border-color 0.2s;
        }
        .nav-brand { display: flex; align-items: center; gap: 10px; }
        .nav-logo {
            width: 30px; height: 30px; border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: grid; place-items: center;
            font-size: 15px; flex-shrink: 0;
        }
        .nav-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
        .nav-right { display: flex; align-items: center; gap: 8px; }

        .btn-icon {
            width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
            border: 1px solid var(--border); background: transparent;
            display: grid; place-items: center; font-size: 15px;
            color: var(--text-sub); transition: border-color 0.15s, color 0.15s;
        }
        .btn-icon:hover { border-color: var(--border-2); color: var(--text); }

        .btn-toggle {
            border: 1px solid var(--border); border-radius: 8px;
            padding: 6px 14px; background: transparent; cursor: pointer;
            font-size: 12px; font-weight: 600; color: var(--text-sub);
            font-family: inherit; transition: all 0.15s;
        }
        .btn-toggle:hover { border-color: var(--border-2); color: var(--text); }

        /* ── Hero ── */
        .hero {
            background: var(--bg-hero);
            border-bottom: 1px solid var(--border);
            padding: 28px 32px 0;
            transition: background 0.2s, border-color 0.2s;
        }
        .hero-inner { max-width: 1280px; margin: 0 auto; }
        .hero-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .hero-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
        .hero-sub   { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

        /* Filtres */
        .filters { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter {
            padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; border: 1px solid var(--border); background: transparent;
            color: var(--text-sub); font-family: inherit; transition: all 0.15s;
        }
        .filter:hover { border-color: var(--border-2); color: var(--text); }
        .filter.active {
            background: var(--text); color: var(--bg);
            border-color: var(--text);
        }

        /* ── Contenu principal ── */
        .main { max-width: 1280px; margin: 0 auto; padding: 28px 32px 60px; }

        .section { margin-bottom: 36px; }
        .section-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--text-muted);
            margin-bottom: 14px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Grille ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }

        /* ── Card ── */
        .card {
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-card);
            cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            display: flex; flex-direction: column;
        }
        .card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: var(--border-2);
        }
        [data-theme="dark"]  .card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.45); }
        [data-theme="light"] .card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .card.locked {
            opacity: 0.38; pointer-events: none;
        }

        /* Image */
        .card-img-wrap { position: relative; overflow: hidden; }
        .card-img {
            width: 100%; aspect-ratio: 16 / 10;
            object-fit: cover; display: block;
            transition: transform 0.25s;
        }
        .card:hover .card-img { transform: scale(1.04); }
        .card-img-ph {
            width: 100%; aspect-ratio: 16 / 10;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
        }
        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
            pointer-events: none;
        }
        .card-badge {
            position: absolute; top: 8px; right: 8px;
            font-size: 10px; font-weight: 700; padding: 3px 8px;
            border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .card-badge.dispo { background: #10b981; color: #fff; }
        .card-badge.secret { background: #6366f1; color: #fff; }
        .card-badge.soon {
            background: rgba(0,0,0,0.55); color: #777;
            border: 1px solid rgba(255,255,255,0.1);
        }
        [data-theme="light"] .card-badge.soon {
            background: rgba(255,255,255,0.8); color: #aaa;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Info */
        .card-info { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .card-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
        .card-meta  { display: flex; align-items: center; justify-content: space-between; }
        .card-level {
            font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
            background: var(--badge-bg); color: var(--badge-txt);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .card-chap { font-size: 11px; color: var(--text-muted); }

        /* ── Hub secret overlay ── */
        .secret-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            display: none; padding: 20px;
        }
        .secret-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

        .secret-shell {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
            width: 100%; max-width: 1100px;
            max-height: calc(100dvh - 40px);
            display: grid; grid-template-rows: auto 1fr;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        .secret-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .secret-topbar-title { font-size: 14px; font-weight: 700; color: var(--text); }
        .secret-topbar-sub   { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
        .secret-close {
            border: 1px solid var(--border); border-radius: 8px; background: transparent;
            color: var(--text-sub); padding: 7px 14px; cursor: pointer;
            font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.15s;
        }
        .secret-close:hover { border-color: var(--border-2); color: var(--text); }
        .secret-body { padding: 20px; overflow-y: auto; }

        /* Placeholders couleur */
        .ph-voleur  { background: linear-gradient(150deg, #0b1a2e, #0d2d4a); }
        .ph-enigma  { background: linear-gradient(150deg, #1a0b2e, #2d0d4a); }
        .ph-matrice { background: linear-gradient(150deg, #1a2000, #2e3d00); }
        .ph-vecth   { background: linear-gradient(150deg, #2e0a00, #4a1500); }
        .ph-music   { background: linear-gradient(150deg, #001a12, #00341f); }

        /* ── Footer ── */
        .footer {
            text-align: center; padding: 20px;
            border-top: 1px solid var(--border);
        }
        .donate-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text-muted);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 6px 14px; transition: all 0.2s;
        }
        .donate-btn:hover { color: var(--text); border-color: var(--border-2); }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .navbar  { padding: 0 16px; }
            .hero    { padding: 20px 16px 0; }
            .main    { padding: 20px 16px 40px; }
            .hero-top { flex-direction: column; align-items: flex-start; }
            .grid    { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- ── Navbar ── -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-logo">📐</div>
            <div class="nav-name">Scolaris</div>
        </div>
        <div class="nav-right">
            <button class="btn-icon" id="secret-btn" title="Hub secret" aria-label="Hub secret">🎵</button>
            <button class="btn-toggle" id="theme-btn" onclick="toggleTheme()">☀ Mode clair</button>
        </div>
    </nav>

    <!-- ── Hero ── -->
    <div class="hero">
        <div class="hero-inner">
            <div class="hero-top">
                <div>
                    <div class="hero-title">Missions Mathématiques</div>
                    <div class="hero-sub">Élaboré par Elliott Sainte-Catherine · Lycée</div>
                </div>
                <div class="filters" id="filters">
                    <button class="filter active" onclick="filtrer('Tous')">Tous</button>
                    <button class="filter" onclick="filtrer('Seconde')">Seconde</button>
                    <button class="filter" onclick="filtrer('Première')">Première</button>
                    <button class="filter" onclick="filtrer('Terminale')">Terminale</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Contenu ── -->
    <main class="main">
        <div class="section">
            <div class="section-title">Disponibles</div>
            <div class="grid" id="grid-dispo"></div>
        </div>
        <div class="section" id="section-dev">
            <div class="section-title">En développement</div>
            <div class="grid" id="grid-dev"></div>
        </div>
    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
        <a href="https://pay.lydia.me/l?t=elliotts4xau" target="_blank" class="donate-btn">
            ☕ Soutenir le créateur
        </a>
    </footer>

    <!-- ── Hub secret ── -->
    <div class="secret-overlay" id="secret-overlay" aria-hidden="true">
        <div class="secret-shell" role="dialog" aria-modal="true">
            <div class="secret-topbar">
                <div>
                    <div class="secret-topbar-title">Hub Secret</div>
                    <div class="secret-topbar-sub">Tous les jeux, y compris bonus et dev</div>
                </div>
                <button class="secret-close" id="secret-close">Fermer</button>
            </div>
            <div class="secret-body">
                <div class="grid" id="secret-grid"></div>
            </div>
        </div>
    </div>

    <script>
        /* ── Données ── */
        const listeJeux = [
            {
                id: "voleur",
                titre: "Le Voleur de Copies",
                niveau: "Seconde",
                chapitre: "Fonctions & Graphiques",
                description: "Infiltrez le système du lycée. Résolvez des calculs d'images, lisez des graphiques et interceptez le voleur.",
                image: "Le_Voleur/le_voleur.png",
                couleur: "#00f3ff",
                fichier: "Le_Voleur/le_voleur.html?jeu=Voleur",
                disponible: true
            },
            {
                id: "studiomusic",
                titre: "StudioMusic (Karaoké)",
                niveau: "Bonus",
                chapitre: "Coaching vocal",
                description: "Détection de justesse + harmonies + éditeur de notes.",
                image: null, imageClass: "ph-music", icon: "🎤",
                couleur: "#1db954",
                fichier: "Karaoke/chant.html",
                disponible: true,
                secretOnly: true
            },
            {
                id: "enigma",
                titre: "Projet Enigma",
                niveau: "Terminale",
                chapitre: "Probabilités",
                description: "Déchiffrez les communications secrètes avec les probabilités conditionnelles.",
                image: null, imageClass: "ph-enigma", icon: "🎲",
                couleur: "#ff00ff",
                fichier: "#",
                disponible: false
            },
            {
                id: "matrice",
                titre: "La Matrice",
                niveau: "Terminale",
                chapitre: "Vecteurs & Espace",
                description: "Naviguez en 3D avec les équations paramétriques pour trouver la sortie.",
                image: null, imageClass: "ph-matrice", icon: "📊",
                couleur: "#ffea00",
                fichier: "#",
                disponible: false
            },
            {
                id: "vecthorreur",
                titre: "Vecthorreur",
                niveau: "Seconde",
                chapitre: "Vecteurs",
                description: "Manipule des vecteurs pour survivre. Échappe au monstre en calculant ta trajectoire.",
                image: "Vecthorreur/vecthorreur.png", imageClass: "ph-vecth", icon: "👾",
                couleur: "#ff4444",
                fichier: "Vecthorreur/vecthorreur.html",
                disponible: true
            }
        ];

        /* ── Rendu d'une carte ── */
        function creerCarte(jeu, isSecret = false) {
            const div = document.createElement('div');
            div.className = 'card' + (jeu.disponible ? '' : ' locked');

            let imgHTML;
            if (jeu.image) {
                imgHTML = `<img src="${jeu.image}" class="card-img" alt="${jeu.titre}" loading="lazy">`;
            } else {
                imgHTML = `<div class="card-img-ph ${jeu.imageClass || ''}">${jeu.icon || ''}</div>`;
            }

            let badge = '';
            if (jeu.secretOnly)   badge = `<div class="card-badge secret">Secret</div>`;
            else if (jeu.disponible) badge = `<div class="card-badge dispo">Disponible</div>`;
            else                  badge = `<div class="card-badge soon">Bientôt</div>`;

            let href = jeu.fichier;
            if (isSecret && jeu.disponible) {
                const sep  = href.includes('?') ? '&' : '?';
                const from = encodeURIComponent(window.location.href);
                href = `${href}${sep}hub=secret&from=${from}`;
            }

            const cible = jeu.disponible ? `href="${href}"` : '';

            div.innerHTML = `
                <a ${cible} style="display:contents;">
                    <div class="card-img-wrap">
                        ${imgHTML}
                        <div class="card-overlay"></div>
                        ${badge}
                    </div>
                    <div class="card-info">
                        <div class="card-title">${jeu.titre}</div>
                        <div class="card-meta">
                            <span class="card-level">${jeu.niveau}</span>
                            <span class="card-chap">${jeu.chapitre}</span>
                        </div>
                    </div>
                </a>
            `;
            return div;
        }

        /* ── Affichage principal ── */
        let filtreActif = 'Tous';

        function afficher() {
            const gridDispo = document.getElementById('grid-dispo');
            const gridDev   = document.getElementById('grid-dev');
            const sectionDev = document.getElementById('section-dev');

            gridDispo.innerHTML = '';
            gridDev.innerHTML   = '';

            let countDev = 0;

            listeJeux.forEach(jeu => {
                if (jeu.secretOnly) return;
                if (filtreActif !== 'Tous' && jeu.niveau !== filtreActif) return;

                const carte = creerCarte(jeu);
                if (jeu.disponible) {
                    gridDispo.appendChild(carte);
                } else {
                    gridDev.appendChild(carte);
                    countDev++;
                }
            });

            sectionDev.style.display = countDev === 0 ? 'none' : '';
        }

        function filtrer(niveau) {
            filtreActif = niveau;
            document.querySelectorAll('.filter').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === niveau || (niveau === 'Tous' && btn.textContent.trim() === 'Tous'));
            });
            afficher();
        }

        /* ── Hub secret ── */
        const SECRET_PIN = "1702";
        let secretUnlocked = false;

        function renderSecretHub() {
            const grid = document.getElementById('secret-grid');
            grid.innerHTML = '';
            listeJeux.forEach(jeu => grid.appendChild(creerCarte(jeu, true)));
        }

        function openSecret() {
            renderSecretHub();
            document.getElementById('secret-overlay').classList.add('open');
            document.getElementById('secret-overlay').setAttribute('aria-hidden', 'false');
        }

        function closeSecret() {
            document.getElementById('secret-overlay').classList.remove('open');
            document.getElementById('secret-overlay').setAttribute('aria-hidden', 'true');
        }

        document.getElementById('secret-btn').addEventListener('click', () => {
            if (!secretUnlocked) {
                const pin = prompt("Hub secret — entre le code PIN :");
                if (pin === null) return;
                if (String(pin).trim() !== SECRET_PIN) { alert("Code incorrect."); return; }
                secretUnlocked = true;
            }
            openSecret();
        });

        document.getElementById('secret-close').addEventListener('click', closeSecret);
        document.getElementById('secret-overlay').addEventListener('click', e => {
            if (e.target === document.getElementById('secret-overlay')) closeSecret();
        });
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeSecret(); });

        /* ── Thème ── */
        function toggleTheme() {
            const html = document.documentElement;
            const dark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', dark ? 'light' : 'dark');
            document.getElementById('theme-btn').textContent = dark ? '🌙 Mode sombre' : '☀ Mode clair';
            localStorage.setItem('theme', dark ? 'light' : 'dark');
        }

        // Restaurer le thème sauvegardé
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-btn').textContent =
                savedTheme === 'light' ? '🌙 Mode sombre' : '☀ Mode clair';
        }

        /* ── Init ── */
        afficher();

        // Auto-ouverture hub secret via ?hub=secret
        if (new URLSearchParams(window.location.search).get('hub') === 'secret') {
            secretUnlocked = true;
            openSecret();
        }
    </script>
</body>
</html>
