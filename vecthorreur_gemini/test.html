<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Vecthorreur</title>
</head>
<body>
    <div id="deck-area"></div>
    <canvas id="game-canvas"></canvas>
    <script src="https://unpkg.com/three@0.164.0/build/three.min.js"></script>
    <script src="v-data.js?v=1"></script>
    <script>
        window.MAPS = MAPS;
        if (typeof ROOMS !== 'undefined') window.ROOMS = ROOMS;
    </script>
    <script type="module">
        import Game from './src/core/Game.js?v=1';
        const manifest = []; // empty manifest to bypass image loading
        window.onerror = function(msg, url, line) {
            document.body.innerHTML += `<div style="color:red; font-size:24px;">ERROR: ${msg} at line ${line}</div>`;
        };
        try {
            const game = new Game('game-canvas');
            game.init(manifest).then(() => {
                document.body.innerHTML += `<div style="color:green; font-size:24px;">INIT OK</div>`;
            }).catch(err => {
                document.body.innerHTML += `<div style="color:red; font-size:24px;">INIT REJECTED: ${err.message}</div>`;
            });
        } catch(e) {
            document.body.innerHTML += `<div style="color:red; font-size:24px;">CONSTRUCTOR ERROR: ${e.message}</div>`;
        }
    </script>
</body>
</html>
