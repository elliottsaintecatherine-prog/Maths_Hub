<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecthorreur Reborn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-canvas {
            display: block;
        }
        #deck-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .btn-deck {
            width: 80px;
            height: 120px;
            background-color: #f4e4bc;
            border: 2px solid #5a3e2b;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            filter: url(#parchment);
        }
        .btn-deck:hover {
            transform: translateY(-10px);
            box-shadow: 2px 14px 15px rgba(0, 0, 0, 0.7);
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        .btn-deck.selected {
            border-color: #ffab00;
            box-shadow: 0 0 15px rgba(255, 171, 0, 0.8);
            transform: translateY(-12px);
        }
        #combo-area {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 10;
        }
        #btn-execute {
            padding: 10px 20px;
            background: linear-gradient(180deg, #5a3e2b, #3e2723);
            color: #f4e4bc;
            border: 2px solid #8d6e63;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s, box-shadow 0.2s;
        }
        #btn-execute:hover {
            background: linear-gradient(180deg, #8d6e63, #5a3e2b);
            box-shadow: 0 0 10px rgba(141, 110, 99, 0.6);
        }
        #result-preview {
            color: #ffab00;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 171, 0, 0.5);
        }
        .btn-multiplier {
            padding: 8px 14px;
            background: linear-gradient(180deg, #4a148c, #311b92);
            color: #e1bee7;
            border: 2px solid #7c43bd;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-multiplier:hover:not(:disabled) {
            background: linear-gradient(180deg, #7c43bd, #4a148c);
            box-shadow: 0 0 10px rgba(124, 67, 189, 0.6);
        }
        .btn-multiplier:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* f2 : HUD In-Game */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            z-index: 20;
            pointer-events: none;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
            font-family: 'Creepster', cursive;
        }
        #hud-health {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .hud-skull {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            filter: drop-shadow(0 0 6px rgba(200, 0, 0, 0.8));
            transition: opacity 0.4s, transform 0.4s;
        }
        .hud-skull.lost {
            opacity: 0.2;
            filter: grayscale(1);
            transform: scale(0.8);
        }
        #hud-room {
            color: #c4a35a;
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(196, 163, 90, 0.5), 0 2px 4px rgba(0, 0, 0, 0.9);
        }
        #hud-score {
            color: #8bc34a;
            font-size: 18px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(139, 195, 74, 0.4);
        }

        /* e5 : Screamer plein écran */
        #screamer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }
        #screamer.active {
            display: flex;
            animation: screamerFlash 0.3s ease-in-out 3;
        }
        #screamer-img {
            max-width: 80vw;
            max-height: 80vh;
            filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
            animation: screamerZoom 0.5s ease-out forwards;
        }
        @keyframes screamerFlash {
            0% { background: rgba(180, 0, 0, 0.95); }
            50% { background: rgba(0, 0, 0, 0.95); }
            100% { background: rgba(180, 0, 0, 0.95); }
        }
        @keyframes screamerZoom {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position:absolute;z-index:-1;">
        <defs>
            <filter id="parchment">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
                <feColorMatrix type="matrix" values="1 0 0 0 0  0 0.9 0 0 0  0 0.7 0 0 0  0 0 0 0.2 0" in="noise" result="coloredNoise" />
                <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply" />
            </filter>
        </defs>
    </svg>
    <!-- f2 : HUD In-Game -->
    <div id="hud">
        <div id="hud-health"></div>
        <div id="hud-room">Salle 1</div>
        <div id="hud-score">Score : 0</div>
    </div>
    <canvas id="game-canvas"></canvas>
    <!-- e5 : Screamer plein écran -->
    <div id="screamer">
        <img id="screamer-img" src="" alt="">
    </div>
    <div id="combo-area">
        <button id="btn-mult-x2" class="btn-multiplier">x2</button>
        <button id="btn-mult-half" class="btn-multiplier">x0.5</button>
        <button id="btn-mult-invert" class="btn-multiplier">Inverser (-u)</button>
        <button id="btn-execute">Executer</button>
        <span id="result-preview"></span>
    </div>
    <div id="deck-area"></div>
    <script src="v-data.js"></script>
    <script>
        // Pont : exposer les const de v-data.js sur window pour les modules ES6
        window.MAPS = MAPS;
        if (typeof ROOMS !== 'undefined') window.ROOMS = ROOMS;
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
