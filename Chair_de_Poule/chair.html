<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chair de Poule — Le Manoir Blackwood</title>
<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:#080503; color:#f5d070; font-family:'Courier New', monospace; user-select:none; }
  #game-canvas { position:absolute; top:0; left:0; width:100vw; height:100vh; image-rendering:pixelated; cursor:default; }

  /* Panneau vecteurs (dépliable, centré en bas pour ne pas masquer la salle) */
  #panel-vectors { position:fixed; left:50%; transform:translateX(-50%) translateY(calc(100% - 42px)); bottom:12px; width:340px; max-width:calc(100vw - 24px); background:rgba(8,5,3,0.92); border:1px solid #3d2810; border-radius:8px; padding:14px; z-index:50; transition:transform 0.25s ease-out; }
  #panel-vectors.expanded { transform:translateX(-50%) translateY(0); }
  #panel-handle { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding-bottom:8px; }
  #panel-handle h3 { font-size:13px; letter-spacing:1px; color:#f5d070; }
  #panel-handle .arrow { font-size:14px; transition:transform 0.25s; }
  #panel-vectors.expanded #panel-handle .arrow { transform:rotate(180deg); }
  #panel-body { padding-top:10px; border-top:1px solid #3d2810; }
  .vec-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .vec-row label { font-size:11px; color:#8a6a2a; min-width:18px; }
  .vec-row input { flex:1; background:#1a1208; border:1px solid #3d2810; color:#f5d070; padding:6px; font-family:inherit; font-size:13px; border-radius:4px; }
  .vec-row input:focus { outline:1px solid #f5d070; }
  .btn-play-vec { width:100%; padding:9px; margin-top:6px; background:#3d2810; border:1px solid #f5d070; color:#f5d070; font-family:inherit; font-size:13px; cursor:pointer; border-radius:4px; letter-spacing:1px; }
  .btn-play-vec:hover { background:#5a3815; }

  /* HUD coin haut-gauche : nom de la salle */
  #room-label { position:fixed; top:12px; left:12px; padding:6px 12px; background:rgba(8,5,3,0.85); border:1px solid #3d2810; color:#f5d070; font-size:12px; letter-spacing:1px; z-index:40; border-radius:4px; }

  /* Bouton retour hub : retire, deplace dans le menu engrenage (coin haut-droit). */

  /* Effet vision noire (malaise / game over progressif) */
  /* Pendant les 30 dernieres secondes : vignette qui se ferme avec teinte rouge sang. */
  #vision-overlay {
    position:fixed; inset:0; pointer-events:none; z-index:30;
    background:
      radial-gradient(ellipse at center, transparent 18%, rgba(40,0,0,0.55) 55%, #000 95%),
      radial-gradient(circle at 50% 50%, transparent 25%, #000 100%);
    opacity:0;
    transition:opacity 0.08s linear; /* transitions rapides pour flicker */
    mix-blend-mode: multiply;
  }
  /* Overlay supplementaire : sursauts rouges du malaise (controle via JS) */
  #malaise-pulse {
    position:fixed; inset:0; pointer-events:none; z-index:31;
    background: radial-gradient(circle at center, rgba(120,0,0,0.0) 40%, rgba(120,0,0,0.35) 100%);
    opacity:0;
    transition:opacity 0.05s linear;
  }

  /* Game over scene */
  #gameover { position:fixed; inset:0; background:#000; z-index:100; display:none; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
  #gameover.show { display:flex; }
  #gameover h1 { font-size:36px; color:#5a0000; letter-spacing:3px; }
  #gameover p { color:#8a6a2a; font-size:14px; }
  #gameover button { margin-top:20px; padding:10px 24px; background:#3d2810; border:1px solid #f5d070; color:#f5d070; font-family:inherit; cursor:pointer; }

  /* Carte tutoriel (mode ?mode=tuto uniquement) */
  #tutorial-note {
    position:fixed; top:60px; left:50%;
    transform:translateX(-50%) translateY(-30px);
    width:440px; max-width:calc(100vw - 40px);
    background:rgba(8,5,3,0.96);
    border:1px solid #f5d070; border-radius:8px;
    padding:18px 22px;
    z-index:6000;
    opacity:0; transition:opacity 0.4s ease, transform 0.4s ease;
    pointer-events:none;
    box-shadow: 0 6px 28px rgba(0,0,0,0.75), inset 0 0 12px rgba(245,208,112,0.05);
    font-family:Georgia, serif;
  }
  #tutorial-note.show {
    opacity:1; transform:translateX(-50%) translateY(0);
    pointer-events:auto;
  }
  #tutorial-note .tut-step {
    font-family:'Courier New', monospace;
    font-size:10px; color:#8a6a2a; letter-spacing:2px;
    margin-bottom:6px;
  }
  #tutorial-note .tut-title {
    font-size:16px; letter-spacing:1.5px; color:#f5d070;
    margin-bottom:12px; text-transform:uppercase;
    border-bottom:1px solid #3d2810; padding-bottom:10px;
    text-shadow: 0 0 8px rgba(245,208,112,0.3);
  }
  #tutorial-note .tut-text {
    font-size:13px; color:#d4b078; line-height:1.65;
    margin-bottom:12px;
  }
  #tutorial-note .tut-hint {
    font-size:12px; color:#8a6a2a; font-style:italic;
    line-height:1.55; margin-bottom:16px;
    padding:8px 0 8px 12px; border-left:2px solid #3d2810;
  }
  #tutorial-note .tut-buttons {
    display:flex; gap:8px; justify-content:flex-end;
  }
  #tutorial-note .tut-btn {
    padding:7px 16px; background:transparent;
    border:1px solid #3d2810; color:#8a6a2a;
    cursor:pointer; font-family:inherit; font-size:12px;
    letter-spacing:1px; border-radius:4px;
    transition:all 0.2s;
  }
  #tutorial-note .tut-btn:hover { color:#f5d070; border-color:#f5d070; }
  #tutorial-note .tut-btn.primary {
    color:#f5d070; border-color:#f5d070; background:#3d2810;
  }
  #tutorial-note .tut-btn.primary:hover { background:#5a3815; }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="room-label">— Hall d'Entrée —</div>

<div id="panel-vectors">
  <div id="panel-handle" onclick="document.getElementById('panel-vectors').classList.toggle('expanded')">
    <h3>♦ DÉPLACEMENT VECTORIEL</h3>
    <span class="arrow">▲</span>
  </div>
  <div id="panel-body">
    <div class="vec-row">
      <label>x =</label>
      <input type="number" id="vec-x" value="0" step="1">
    </div>
    <div class="vec-row">
      <label>y =</label>
      <input type="number" id="vec-y" value="0" step="1">
    </div>
    <button class="btn-play-vec" id="btn-play-vec">▶ INVOQUER LE VECTEUR</button>
  </div>
</div>

<div id="vision-overlay"></div>
<div id="malaise-pulse"></div>

<div id="gameover">
  <h1>HANTÉ</h1>
  <p>Le Manoir t'a englouti...</p>
  <button onclick="window.location.reload()">Recommencer</button>
</div>

<script src="sound.js?v=22"></script>
<script src="chair-data.js?v=22"></script>
<script src="chair.js?v=22"></script>

</body>
</html>
