<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecthorreur Reborn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-canvas {
            display: block;
        }
        #deck-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .btn-deck {
            width: 80px;
            height: 120px;
            background-color: #f4e4bc;
            border: 2px solid #5a3e2b;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #3e2723;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            filter: url(#parchment);
        }
        .btn-deck:hover {
            transform: translateY(-10px);
            box-shadow: 2px 14px 15px rgba(0, 0, 0, 0.7);
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        .btn-deck.selected {
            border-color: #ffab00;
            box-shadow: 0 0 15px rgba(255, 171, 0, 0.8);
            transform: translateY(-12px);
        }
        #combo-area {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 10;
        }
        #btn-execute {
            padding: 10px 20px;
            background: linear-gradient(180deg, #5a3e2b, #3e2723);
            color: #f4e4bc;
            border: 2px solid #8d6e63;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s, box-shadow 0.2s;
        }
        #btn-execute:hover {
            background: linear-gradient(180deg, #8d6e63, #5a3e2b);
            box-shadow: 0 0 10px rgba(141, 110, 99, 0.6);
        }
        #result-preview {
            color: #ffab00;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 171, 0, 0.5);
        }
        .btn-multiplier {
            padding: 8px 14px;
            background: linear-gradient(180deg, #4a148c, #311b92);
            color: #e1bee7;
            border: 2px solid #7c43bd;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-multiplier:hover:not(:disabled) {
            background: linear-gradient(180deg, #7c43bd, #4a148c);
            box-shadow: 0 0 10px rgba(124, 67, 189, 0.6);
        }
        .btn-multiplier:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* f2 : HUD In-Game */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            z-index: 20;
            pointer-events: none;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
            font-family: 'Creepster', cursive;
        }
        #hud-health {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .hud-skull {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            filter: drop-shadow(0 0 6px rgba(200, 0, 0, 0.8));
            transition: opacity 0.4s, transform 0.4s;
        }
        .hud-skull.lost {
            opacity: 0.2;
            filter: grayscale(1);
            transform: scale(0.8);
        }
        #hud-room {
            color: #c4a35a;
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(196, 163, 90, 0.5), 0 2px 4px rgba(0, 0, 0, 0.9);
        }
        #hud-score {
            color: #8bc34a;
            font-size: 18px;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(139, 195, 74, 0.4);
        }

        /* e5 : Screamer plein écran */
        #screamer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }
        #screamer.active {
            display: flex;
            animation: screamerFlash 0.3s ease-in-out 3;
        }
        #screamer-img {
            max-width: 80vw;
            max-height: 80vh;
            filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
            animation: screamerZoom 0.5s ease-out forwards;
        }
        @keyframes screamerFlash {
            0% { background: rgba(180, 0, 0, 0.95); }
            50% { background: rgba(0, 0, 0, 0.95); }
            100% { background: rgba(180, 0, 0, 0.95); }
        }
        @keyframes screamerZoom {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* f3 : Menus Transitoires (Overlay) */
        .overlay-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
            background: rgba(0, 0, 0, 0.92);
            font-family: 'Creepster', cursive;
            flex-direction: column;
            gap: 20px;
            animation: overlayFadeIn 0.5s ease-out;
        }
        .overlay-menu.active {
            display: flex;
        }
        @keyframes overlayFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .overlay-title {
            font-size: 48px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px currentColor, 0 4px 8px rgba(0, 0, 0, 0.9);
            text-align: center;
        }
        .overlay-subtitle {
            font-size: 22px;
            color: #aaa;
            text-align: center;
            margin-bottom: 10px;
        }
        .overlay-btn {
            padding: 14px 40px;
            font-family: 'Creepster', cursive;
            font-size: 22px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            letter-spacing: 2px;
        }
        .overlay-btn:hover {
            transform: scale(1.08);
        }
        /* Level Complete */
        #level-complete-screen .overlay-title {
            color: #4caf50;
        }
        #level-complete-screen .overlay-btn {
            background: linear-gradient(180deg, #2e7d32, #1b5e20);
            color: #c8e6c9;
            border-color: #4caf50;
        }
        #level-complete-screen .overlay-btn:hover {
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }
        /* Game Over */
        #game-over-screen .overlay-title {
            color: #f44336;
        }
        #game-over-screen .overlay-btn {
            background: linear-gradient(180deg, #c62828, #b71c1c);
            color: #ffcdd2;
            border-color: #f44336;
        }
        #game-over-screen .overlay-btn:hover {
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.6);
        }

        /* f4 : Menu Principal */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
            background: radial-gradient(ellipse at center, #1a0a0a 0%, #000 70%);
            font-family: 'Creepster', cursive;
            gap: 30px;
        }
        #main-menu.hidden {
            display: none;
        }
        #main-menu-title {
            font-size: 72px;
            color: #b71c1c;
            text-shadow:
                0 0 20px rgba(183, 28, 28, 0.8),
                0 0 60px rgba(183, 28, 28, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.9);
            letter-spacing: 6px;
            text-align: center;
            animation: titlePulse 3s ease-in-out infinite;
            user-select: none;
        }
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 20px rgba(183, 28, 28, 0.8), 0 0 60px rgba(183, 28, 28, 0.4), 0 4px 8px rgba(0, 0, 0, 0.9); }
            50% { text-shadow: 0 0 40px rgba(255, 40, 40, 1), 0 0 100px rgba(183, 28, 28, 0.7), 0 4px 8px rgba(0, 0, 0, 0.9); }
        }
        #main-menu-subtitle {
            font-size: 20px;
            color: #666;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #btn-play {
            padding: 18px 60px;
            font-family: 'Creepster', cursive;
            font-size: 32px;
            color: #ffcdd2;
            background: linear-gradient(180deg, #b71c1c, #880e0e);
            border: 3px solid #e53935;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
            box-shadow: 0 0 30px rgba(183, 28, 28, 0.4);
        }
        #btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(229, 57, 53, 0.8);
            background: linear-gradient(180deg, #e53935, #b71c1c);
        }

        /* f4 : Cacher les éléments de jeu au démarrage */
        .game-hidden {
            visibility: hidden;
        }

        /* g2 : Post-Processing CRT */
        #crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
        }
        /* Scanlines */
        #crt-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            animation: crtFlicker 0.08s infinite alternate;
        }
        /* Vignette */
        #crt-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 50%,
                rgba(0, 0, 0, 0.5) 85%,
                rgba(0, 0, 0, 0.85) 100%
            );
        }
        @keyframes crtFlicker {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <svg width="0" height="0" style="position:absolute;z-index:-1;">
        <defs>
            <filter id="parchment">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
                <feColorMatrix type="matrix" values="1 0 0 0 0  0 0.9 0 0 0  0 0.7 0 0 0  0 0 0 0.2 0" in="noise" result="coloredNoise" />
                <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply" />
            </filter>
        </defs>
    </svg>
    <!-- f4 : Menu Principal -->
    <div id="main-menu">
        <div id="main-menu-title">VECTHORREUR REBORN</div>
        <div id="main-menu-subtitle">Un jeu de vecteurs horrifique</div>
        <button id="btn-play">JOUER</button>
    </div>
    <!-- f2 : HUD In-Game -->
    <div id="hud" class="game-hidden">
        <div id="hud-health"></div>
        <div id="hud-room">Salle 1</div>
        <div id="hud-score">Score : 0</div>
    </div>
    <canvas id="game-canvas"></canvas>
    <!-- g2 : CRT Post-Processing Overlay -->
    <div id="crt-overlay"></div>
    <!-- e5 : Screamer plein écran -->
    <div id="screamer">
        <img id="screamer-img" src="" alt="">
    </div>
    <div id="combo-area" class="game-hidden">
        <button id="btn-mult-x2" class="btn-multiplier">x2</button>
        <button id="btn-mult-half" class="btn-multiplier">x0.5</button>
        <button id="btn-mult-invert" class="btn-multiplier">Inverser (-u)</button>
        <button id="btn-execute">Executer</button>
        <span id="result-preview"></span>
    </div>
    <div id="deck-area" class="game-hidden"></div>
    <!-- f3 : Menu Salle Terminée -->
    <div id="level-complete-screen" class="overlay-menu">
        <div class="overlay-title">Salle Terminee</div>
        <div class="overlay-subtitle" id="level-recap">Coups utilises : 0</div>
        <button class="overlay-btn" id="btn-next-level">Niveau Suivant</button>
    </div>
    <!-- f3 : Menu Game Over -->
    <div id="game-over-screen" class="overlay-menu">
        <div class="overlay-title">Game Over</div>
        <div class="overlay-subtitle">Le monstre vous a devore...</div>
        <button class="overlay-btn" id="btn-restart">Recommencer</button>
    </div>
    <!-- h1 : Three.js via CDN -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="v-data.js"></script>
    <script>
        // Pont : exposer les const de v-data.js sur window pour les modules ES6
        window.MAPS = MAPS;
        if (typeof ROOMS !== 'undefined') window.ROOMS = ROOMS;
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
