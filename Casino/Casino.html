<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The House of Chance — Scolaris</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="casino.css">
</head>
<body>

<div class="casino-table">
  <div class="header">
    <a href="../index.html" class="btn-back">← Hub</a>
    <div class="title-sub">The House of Chance</div>
    <div class="bank">💶 <span id="bank-val">—</span> €</div>
  </div>

  <div class="question-area" id="question-text">
    Connexion à la table en cours...
  </div>

  <div id="feedback" class="feedback"></div>

  <div class="inputs-row">
    <div class="input-group">
      <label>Probabilité de l'événement (décimal ou fraction)</label>
      <input type="text" id="answer-input" placeholder="ex: 0.25 ou 1/4" autocomplete="off">
      <div class="skip-hint">Laisse vide pour passer (malus)</div>
    </div>
    <div class="input-group">
      <label>Mise (€)</label>
      <input type="number" id="bet-input" value="50" min="10">
    </div>
  </div>

  <button class="btn-play" id="play-btn">LANCER LE PARI</button>

  <div class="visualizer" id="machine">🎰</div>

  <div class="status-bar" id="status">En attente d'une mise...</div>

  <div class="logs" id="game-logs">
    > Connexion sécurisée établie.<br>
    > Bienvenue dans la Maison du Hasard.<br>
  </div>
</div>

<script type="module" src="casino.js"></script>

</body>
</html>
