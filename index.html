<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scolaris — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* THÈME */
:root {
  --bg:#111214; --bg-card:#18191f; --bg-hero:#111214; --nav-bg:#111214;
  --border:#1e2026; --border-2:#2a2d35;
  --text:#e8e8e8; --text-muted:#44484f; --text-sub:#555b66;
  --badge-bg:#222430; --badge-txt:#555;
}
[data-theme="light"] {
  --bg:#f4f4f6; --bg-card:#fff; --bg-hero:#fff; --nav-bg:#fff;
  --border:#e4e4e8; --border-2:#d0d0d8;
  --text:#111; --text-muted:#bbb; --text-sub:#aaa;
  --badge-bg:#f0f0f4; --badge-txt:#999;
}

/* BASE */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .2s,color .2s; }
a { text-decoration:none; color:inherit; }

/* NAVBAR */
.navbar { display:flex; justify-content:space-between; align-items:center; padding:0 32px; height:56px; background:var(--nav-bg); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:200; transition:background .2s,border-color .2s; }
.nav-brand { display:flex; align-items:center; gap:10px; }
.nav-logo { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:grid; place-items:center; font-size:15px; flex-shrink:0; }
.nav-name { font-size:16px; font-weight:800; letter-spacing:-.3px; }
.nav-right { display:flex; align-items:center; gap:8px; }
.btn-icon { width:34px; height:34px; border-radius:8px; cursor:pointer; border:1px solid var(--border); background:transparent; display:grid; place-items:center; font-size:15px; color:var(--text-sub); transition:border-color .15s,color .15s; }
.btn-icon:hover { border-color:var(--border-2); color:var(--text); }
.btn-toggle { border:1px solid var(--border); border-radius:8px; padding:6px 14px; background:transparent; cursor:pointer; font-size:12px; font-weight:600; color:var(--text-sub); font-family:inherit; transition:all .15s; }
.btn-toggle:hover { border-color:var(--border-2); color:var(--text); }

/* HERO */
.hero { background:var(--bg-hero); border-bottom:1px solid var(--border); padding:28px 32px 0; transition:background .2s,border-color .2s; }
.hero-inner { max-width:1280px; margin:0 auto; }
.hero-top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; gap:16px; flex-wrap:wrap; }
.hero-title { font-size:26px; font-weight:900; letter-spacing:-.5px; }
.hero-sub { font-size:13px; color:var(--text-muted); margin-top:3px; }
.hero-bottom { display:flex; justify-content:space-between; align-items:center; padding-bottom:16px; gap:12px; flex-wrap:wrap; }

/* FILTRES */
.filters { display:flex; gap:6px; flex-wrap:wrap; }
.filter { padding:7px 16px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-sub); font-family:inherit; transition:all .15s; }
.filter:hover { border-color:var(--border-2); color:var(--text); }
.filter.active { background:var(--text); color:var(--bg); border-color:var(--text); }

/* RECHERCHE */
.search-wrap { position:relative; display:inline-flex; align-items:center; width:100%; max-width:320px; }
.search-icon { position:absolute; left:10px; font-size:13px; color:var(--text-muted); pointer-events:none; line-height:1; }
.search-input { width:100%; padding:7px 12px 7px 32px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text); font-size:12px; font-family:inherit; outline:none; transition:border-color .15s,background .15s; }
.search-input:focus { border-color:var(--border-2); background:var(--bg-card); }
.search-input::placeholder { color:var(--text-muted); }

/* CONTENU */
.main { max-width:1280px; margin:0 auto; padding:28px 32px 60px; }
.section { margin-bottom:36px; }
.section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }

/* CARD */
.card { border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--bg-card); cursor:pointer; transition:transform .18s,box-shadow .18s,border-color .18s; display:flex; flex-direction:column; }
.card:hover { transform:translateY(-3px) scale(1.01); border-color:var(--border-2); }
[data-theme="dark"]  .card:hover { box-shadow:0 10px 30px rgba(0,0,0,.45); }
[data-theme="light"] .card:hover { box-shadow:0 10px 30px rgba(0,0,0,.1); }
.card.locked { opacity:.38; pointer-events:none; }
.card-img-wrap { position:relative; overflow:hidden; }
.card-img { width:100%; aspect-ratio:16/10; object-fit:cover; display:block; transition:transform .25s; }
.card:hover .card-img { transform:scale(1.04); }
.card-img-ph { width:100%; aspect-ratio:16/10; display:flex; align-items:center; justify-content:center; font-size:36px; }
.card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%); pointer-events:none; }
.card-badge { position:absolute; top:8px; right:8px; font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; letter-spacing:.5px; text-transform:uppercase; }
.card-badge.dispo  { background:#10b981; color:#fff; }
.card-badge.secret { background:#6366f1; color:#fff; }
.card-badge.soon   { background:rgba(0,0,0,.55); color:#777; border:1px solid rgba(255,255,255,.1); }
[data-theme="light"] .card-badge.soon { background:rgba(255,255,255,.8); color:#aaa; border:1px solid rgba(0,0,0,.1); }
.card-info { padding:10px 12px 12px; flex:1; display:flex; flex-direction:column; gap:6px; }
.card-title { font-size:13px; font-weight:700; line-height:1.3; }
.card-meta { display:flex; align-items:center; justify-content:space-between; }
.card-level { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; background:var(--badge-bg); color:var(--badge-txt); text-transform:uppercase; letter-spacing:.5px; }
.card-chap { font-size:11px; color:var(--text-muted); }

/* PLACEHOLDERS COULEUR — ajouter .ph-xxx par jeu */
.ph-voleur { background:linear-gradient(150deg,#0b1a2e,#0d2d4a); }
.ph-enigma { background:linear-gradient(150deg,#1a0b2e,#2d0d4a); }
.ph-matrice{ background:linear-gradient(150deg,#1a2000,#2e3d00); }
.ph-vecth  { background:linear-gradient(150deg,#2e0a00,#4a1500); }
.ph-music  { background:linear-gradient(150deg,#001a12,#00341f); }
.ph-neural { background:linear-gradient(150deg,#0a0012,#1a0033); }
.ph-fight { background:linear-gradient(150deg,#0b1a2e,#0d2d4a); }


/* FOOTER */
.footer { text-align:center; padding:20px; border-top:1px solid var(--border); }
.donate-btn { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); border:1px solid var(--border); border-radius:20px; padding:6px 14px; transition:all .2s; }
.donate-btn:hover { color:var(--text); border-color:var(--border-2); }

/* RESPONSIVE */
@media (max-width:600px) {
  .navbar,.hero { padding-left:16px; padding-right:16px; }
  .main { padding:20px 16px 40px; }
  .hero-bottom { flex-direction:column; align-items:flex-start; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .search-wrap { max-width:100%; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">📐</div>
    <div class="nav-name">Scolaris</div>
  </div>
  <div class="nav-right">
    <button class="btn-icon" id="secret-btn" title="Hub secret">🎵</button>
    <button class="btn-toggle" id="theme-btn" onclick="toggleTheme()">☀ Mode clair</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div>
        <div class="hero-title">Missions Mathématiques</div>
        <div class="hero-sub">Élaboré par Elliott Sainte-Catherine · Lycée</div>
      </div>
    </div>
    <div class="hero-bottom">
      <div class="filters" id="filters">
        <button class="filter active" onclick="filtrer('Tous')">Tous</button>
        <button class="filter" onclick="filtrer('Seconde')">Seconde</button>
        <button class="filter" onclick="filtrer('Première')">Première</button>
        <button class="filter" onclick="filtrer('Terminale')">Terminale</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="Rechercher un jeu…" autocomplete="off">
      </div>
    </div>
  </div>
</div>

<!-- CONTENU -->
<main class="main">
  <div class="section">
    <div class="section-title">Disponibles</div>
    <div class="grid" id="grid-dispo"></div>
  </div>
  <div class="section" id="section-dev">
    <div class="section-title">En développement</div>
    <div class="grid" id="grid-dev"></div>
  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <a href="https://pay.lydia.me/l?t=elliotts4xau" target="_blank" class="donate-btn">☕ Soutenir le créateur</a>
</footer>

<script>
/* ============================================================
   DATA — ajouter/modifier les jeux ici
   Champs : id, titre, niveau, chapitre, description,
            image (chemin) ou imageClass+icon (placeholder),
            fichier (URL), disponible (bool), secretOnly (bool)
   ============================================================ */
const JEUX = [
  { id:"voleur",     titre:"Le Voleur de Copies",   niveau:"Seconde",   chapitre:"Fonctions & Graphiques", description:"Infiltrez le système du lycée. Résolvez des calculs d'images, lisez des graphiques et interceptez le voleur.", image:"Le_Voleur/le_voleur.png",              fichier:"Le_Voleur/le_voleur.html?jeu=Voleur",           disponible:true  },
  { id:"vecthorreur",titre:"Vecthorreur",            niveau:"Seconde",   chapitre:"Vecteurs",               description:"Manipule des vecteurs pour survivre. Échappe au monstre en calculant ta trajectoire.",                        image:"Vecthorreur/vecthorreur.png",          fichier:"Vecthorreur/vecthorreur.html",                  disponible:true  },
  { id:"enigma",     titre:"Projet Enigma",          niveau:"Terminale", chapitre:"Probabilités",           description:"Déchiffrez les communications secrètes avec les probabilités conditionnelles.",                               imageClass:"ph-enigma", icon:"🎲",     fichier:"#",                                    disponible:false },
  { id:"matrice",    titre:"La Matrice",             niveau:"Terminale", chapitre:"Vecteurs & Espace",      description:"Naviguez en 3D avec les équations paramétriques pour trouver la sortie.",                                    imageClass:"ph-matrice",icon:"📊",     fichier:"#",                                    disponible:false },
  { id:"studiomusic",titre:"Karaoké Studio",          niveau:"Bonus",     chapitre:"Coaching vocal",         description:"Chante en karaoké, détection de justesse en temps réel, harmonies IA et éditeur de notes.",               imageClass:"ph-music",  icon:"🎤",     fichier:"La compagnie créole/chant.html",        disponible:true, secretOnly:true },
  { id:"neural_knockout",     titre:"Neural Knockout",   niveau:"Seconde",   chapitre:"Général", description:"Battez vous contre vos amis à un jeu de reflexe et montrez leur qui est le plus fort.", image:"neural_knockout/neural_knockout.png",       fichier:"neural_knockout/neural_knockout.html",  disponible:true  },

];

/* ============================================================
   RENDER
   ============================================================ */
function creerCarte(jeu) {
  const img = jeu.image
    ? `<img src="${jeu.image}" class="card-img" alt="${jeu.titre}" loading="lazy">`
    : `<div class="card-img-ph ${jeu.imageClass||''}">${jeu.icon||''}</div>`;
  const badge = jeu.secretOnly      ? `<div class="card-badge secret">Bonus</div>`
              : jeu.disponible       ? `<div class="card-badge dispo">Disponible</div>`
              :                        `<div class="card-badge soon">Bientôt</div>`;
  const div = document.createElement('div');
  div.className = 'card' + (jeu.disponible ? '' : ' locked');
  const href = jeu.disponible ? 'href="' + jeu.fichier + '"' : '';
  div.innerHTML = `<a ${href} style="display:contents;">
    <div class="card-img-wrap">${img}<div class="card-overlay"></div>${badge}</div>
    <div class="card-info">
      <div class="card-title">${jeu.titre}</div>
      <div class="card-meta"><span class="card-level">${jeu.niveau}</span><span class="card-chap">${jeu.chapitre}</span></div>
    </div></a>`;
  return div;
}

/* ============================================================
   FILTER + AFFICHAGE
   ============================================================ */
let filtreActif = 'Tous';
let secretUnlocked = false;

function afficher() {
  const dispo = document.getElementById('grid-dispo');
  const dev   = document.getElementById('grid-dev');
  const q     = document.getElementById('search-input').value.trim().toLowerCase();
  dispo.innerHTML = dev.innerHTML = '';
  let nDev = 0;

  JEUX.forEach(jeu => {
    if (jeu.secretOnly && !secretUnlocked) return;
    if (filtreActif !== 'Tous') {
      if (filtreActif === 'Bonus' ? (!jeu.secretOnly && jeu.niveau !== 'Bonus') : jeu.niveau !== filtreActif) return;
    }
    if (q && !(jeu.titre+' '+jeu.chapitre+' '+(jeu.description||'')).toLowerCase().includes(q)) return;
    jeu.disponible ? dispo.appendChild(creerCarte(jeu)) : (dev.appendChild(creerCarte(jeu)), nDev++);
  });

  document.getElementById('section-dev').style.display = nDev ? '' : 'none';
}

function filtrer(niveau) {
  filtreActif = niveau;
  document.querySelectorAll('#filters .filter').forEach(b => b.classList.toggle('active', b.textContent.trim() === niveau));
  afficher();
}

/* ============================================================
   HUB SECRET
   ============================================================ */
const SECRET_PIN = "1702";

function deverrouillerSecret() {
  secretUnlocked = true;
  document.getElementById('secret-btn').style.display = 'none';
  const btn = document.createElement('button');
  btn.className = 'filter';
  btn.textContent = 'Jeux bonus';
  btn.onclick = () => filtrer('Bonus');
  document.getElementById('filters').appendChild(btn);
  afficher();
}

document.getElementById('secret-btn').addEventListener('click', () => {
  const pin = prompt("Hub secret — entre le code PIN :");
  if (pin === null) return;
  if (String(pin).trim() !== SECRET_PIN) { alert("Code incorrect."); return; }
  deverrouillerSecret();
});

/* ============================================================
   THÈME
   ============================================================ */
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = dark ? '🌙 Mode sombre' : '☀ Mode clair';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
const saved = localStorage.getItem('theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-btn').textContent = saved === 'light' ? '🌙 Mode sombre' : '☀ Mode clair';
}

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('search-input').addEventListener('input', afficher);
afficher();
if (new URLSearchParams(location.search).get('hub') === 'secret') deverrouillerSecret();
</script>
</body>
</html>
