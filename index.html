<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUB - Missions Mathématiques</title>

    <style>
        /* --- CSS THEME TERMINAL/HUB --- */
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        h3 {
            color: #888;
            font-weight: normal;
            margin-top: 0;
            text-align: center;
            margin-bottom: 30px;
        }
        
        f1 {
            color: #555;
            font-size: 0.9rem;
            font-style: italic;
        }

        /* Système de Filtres */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            background: #111;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .filter-btn:hover { background: #222; color: #fff; }
        .filter-btn.active { border-color: #00f3ff; color: #00f3ff; background: rgba(0, 243, 255, 0.1); }

        /* Grille des Jeux */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* Carte de Jeu */
        .game-card {
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--theme-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 15px var(--theme-color-glow);
        }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .game-title {
            color: var(--theme-color);
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0 0 5px 0;
            text-align: center;
        }

        .game-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
        }

        .tag.level { border-color: #aaa; color: #aaa; }
        .tag.chapter { border-color: var(--theme-color); color: var(--theme-color); }

        .game-desc {
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .play-btn {
            background: var(--theme-color);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            display: block;
        }

        .play-btn:hover {
            filter: brightness(1.2);
        }

        .game-card.disabled {
            opacity: 0.5;
            filter: grayscale(100%);
            border-color: #333 !important;
        }
        .game-card.disabled:hover {
            transform: none; box-shadow: none; cursor: not-allowed;
        }
        .game-card.disabled .play-btn {
            background: #333; color: #666; cursor: not-allowed; pointer-events: none;
        }

        /* --- Bouton de Don --- */
        .footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        .donate-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #111;
            color: #777;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .donate-btn:hover {
            color: #fff;
            border-color: #ff9d00;
            background: rgba(255, 157, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 157, 0, 0.2);
        }

        /* --- HUB SECRET (PIN 1702) --- */
        .music-logo {
            position: fixed;
            right: 16px;
            top: 16px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
        }
        .music-logo:hover { transform: translateY(-1px); background: rgba(255, 255, 255, 0.09); border-color: rgba(0, 243, 255, 0.35); }
        .music-logo span { font-size: 22px; filter: drop-shadow(0 0 10px rgba(0,243,255,0.25)); }

        .secret-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 9999;
            padding: 18px;
        }
        .secret-overlay.open { display: block; }
        .secret-shell {
            max-width: 1100px;
            margin: 0 auto;
            height: calc(100dvh - 36px);
            background: #070707;
            border: 1px solid #222;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .secret-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #222;
            background: linear-gradient(180deg, rgba(0,243,255,0.08), rgba(255,255,255,0.00));
        }
        .secret-title {
            display: grid;
            gap: 2px;
        }
        .secret-title strong {
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .secret-title small {
            color: #9aa0a6;
        }
        .secret-close {
            background: #111;
            border: 1px solid #333;
            color: #ddd;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
        }
        .secret-close:hover { border-color: #00f3ff; color: #00f3ff; background: rgba(0, 243, 255, 0.08); }
        .secret-body {
            padding: 16px;
            overflow: auto;
        }
        .secret-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="music-logo" id="music-logo" title="Double-clic">
        <span>🎵</span>
    </div>

    <h1>DASHBOARD SCOLARIS</h1>
    <h2>Missions d'entraînement Mathématiques</h2>
    <br/>
    <f1>Jeux élaborés par le seul et unique Elliott Sainte-Catherine</f1>
    <br/>

    <div class="filters">
        <button class="filter-btn active" onclick="filtrerJeux('Tous')">Tous les niveaux</button>
        <button class="filter-btn" onclick="filtrerJeux('Seconde')">Seconde</button>
        <button class="filter-btn" onclick="filtrerJeux('Première')">Première</button>
        <button class="filter-btn" onclick="filtrerJeux('Terminale')">Terminale</button>
    </div>

    <div class="games-grid" id="games-container">
        </div>

    <!-- HUB SECRET (double-clic 🎵 + PIN 1702) -->
    <div class="secret-overlay" id="secret-overlay" aria-hidden="true">
        <div class="secret-shell" role="dialog" aria-modal="true" aria-label="Hub secret">
            <div class="secret-topbar">
                <div class="secret-title">
                    <strong>Hub Secret</strong>
                    <small>Tous les jeux (y compris bonus / dev)</small>
                </div>
                <button class="secret-close" id="secret-close">Fermer</button>
            </div>
            <div class="secret-body">
                <div class="secret-grid" id="secret-container"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="VOTRE_LIEN_PAYPAL_ICI" target="_blank" class="donate-btn">
            ☕ Soutenir le créateur
        </a>
    </div>

    <script>
        const listeJeux = [
            {
                id: "voleur",
                titre: "Le Voleur de Copies",
                icon: "🕵️‍♂️",
                couleur: "#00f3ff",          
                niveau: "Seconde",         
                chapitre: "Fonctions & Graphiques",
                description: "Infiltrez le système du lycée. Résolvez des calculs d'images, lisez des graphiques et interceptez le voleur.",
                fichier: "le_voleur.html?jeu=Voleur", // <-- LE PARAMÈTRE EST LÀ
                disponible: true
            },
            {
                id: "studiomusic",
                titre: "StudioMusic (Karaoké)",
                icon: "🎤",
                couleur: "#1db954",
                niveau: "Bonus",
                chapitre: "Coaching vocal / SingStar",
                description: "Détection de justesse + harmonies + éditeur de notes (PIN 1702 dans le jeu).",
                fichier: "Jeu%20perso/chant.html",
                disponible: true,
                secretOnly: true
            },
            {
                id: "enigma",
                titre: "Projet Enigma",
                icon: "🎲",
                couleur: "#ff00ff",          
                niveau: "Terminale",
                chapitre: "Probabilités Conditionnelles",
                description: "Déchiffrez les communications secrètes en utilisant les lois de probabilités et les arbres pondérés.",
                fichier: "#", 
                disponible: false            
            },
            {
                id: "matrice",
                titre: "La Matrice",
                icon: "📊",
                couleur: "#ffea00",          
                niveau: "Terminale",
                chapitre: "Vecteurs & Espace",
                description: "Naviguez dans un espace en 3D en utilisant les équations paramétriques et cartésiennes pour trouver la sortie.",
                fichier: "#", 
                disponible: false
            }
        ];

        const conteneur = document.getElementById('games-container');
        const secretOverlay = document.getElementById('secret-overlay');
        const secretClose = document.getElementById('secret-close');
        const secretContainer = document.getElementById('secret-container');
        const musicLogo = document.getElementById('music-logo');

        const SECRET_PIN = "1702";
        let secretUnlocked = false;

        function afficherJeux(filtreNiveau) {
            conteneur.innerHTML = ""; 

            listeJeux.forEach(jeu => {
                if (jeu.secretOnly) return; // caché dans le hub normal
                if (filtreNiveau === "Tous" || jeu.niveau === filtreNiveau) {
                    
                    const carte = document.createElement('div');
                    carte.className = `game-card ${jeu.disponible ? '' : 'disabled'}`;
                    carte.style.setProperty('--theme-color', jeu.couleur);
                    carte.style.setProperty('--theme-color-glow', jeu.couleur + '66'); 

                    let bouttonHTML = jeu.disponible 
                        ? `<a href="${jeu.fichier}" class="play-btn">LANCER LA MISSION</a>`
                        : `<span class="play-btn">EN DÉVELOPPEMENT</span>`;

                    carte.innerHTML = `
                        <div class="game-icon">${jeu.icon}</div>
                        <h2 class="game-title">${jeu.titre}</h2>
                        <div class="game-tags">
                            <span class="tag level">${jeu.niveau}</span>
                            <span class="tag chapter">${jeu.chapitre}</span>
                        </div>
                        <p class="game-desc">${jeu.description}</p>
                        ${bouttonHTML}
                    `;

                    conteneur.appendChild(carte);
                }
            });
        }

        function filtrerJeux(niveau) {
            const boutons = document.querySelectorAll('.filter-btn');
            boutons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(niveau)) {
                    btn.classList.add('active');
                }
            });
            afficherJeux(niveau);
        }

        function renderSecretHub() {
            secretContainer.innerHTML = '';

            // Ici: "tous les jeux" = on affiche tout, même en développement
            const all = listeJeux.slice();

            all.forEach(jeu => {
                const carte = document.createElement('div');
                carte.className = `game-card ${jeu.disponible ? '' : 'disabled'}`;
                carte.style.setProperty('--theme-color', jeu.couleur);
                carte.style.setProperty('--theme-color-glow', jeu.couleur + '66');

                let bouttonHTML = jeu.disponible
                    ? `<a href="${jeu.fichier}" class="play-btn">LANCER</a>`
                    : `<span class="play-btn">EN DÉVELOPPEMENT</span>`;

                carte.innerHTML = `
                    <div class="game-icon">${jeu.icon}</div>
                    <h2 class="game-title">${jeu.titre}</h2>
                    <div class="game-tags">
                        <span class="tag level">${jeu.niveau}</span>
                        <span class="tag chapter">${jeu.chapitre}</span>
                    </div>
                    <p class="game-desc">${jeu.description}</p>
                    ${bouttonHTML}
                `;
                secretContainer.appendChild(carte);
            });
        }

        function openSecretHub() {
            renderSecretHub();
            secretOverlay.classList.add('open');
            secretOverlay.setAttribute('aria-hidden', 'false');
        }

        function closeSecretHub() {
            secretOverlay.classList.remove('open');
            secretOverlay.setAttribute('aria-hidden', 'true');
        }

        function promptSecretPin() {
            const pin = prompt("Hub secret — entre le code PIN :");
            if (pin === null) return false;
            if (String(pin).trim() === SECRET_PIN) {
                secretUnlocked = true;
                return true;
            }
            alert("Code incorrect.");
            return false;
        }

        if (musicLogo) {
            musicLogo.addEventListener('dblclick', () => {
                if (!secretUnlocked) {
                    const ok = promptSecretPin();
                    if (!ok) return;
                }
                openSecretHub();
            });
        }
        secretClose.addEventListener('click', closeSecretHub);
        secretOverlay.addEventListener('click', (e) => {
            if (e.target === secretOverlay) closeSecretHub();
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSecretHub();
        });

        afficherJeux("Tous");
    </script>
</body>
</html>
