<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack — Choisir une Variante</title>
  <link rel="stylesheet" href="../style-vegas.css">
  <style>
    .hub-wrap {
      max-width: 860px;
      margin: 3rem auto;
      padding: 0 1.2rem 3rem;
      position: relative;
      z-index: 1;
    }
    .hub-subtitle {
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--cream-dim);
      font-size: 0.92rem;
      margin-bottom: 2.4rem;
      letter-spacing: 0.04em;
    }
    .variants-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.4rem;
    }
    @media (max-width: 600px) { .variants-grid { grid-template-columns: 1fr; } }

    .variant-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2.2rem 1.2rem 1.8rem;
      border-radius: 20px;
      border: 1px solid;
      text-decoration: none;
      color: var(--cream);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .variant-tile:hover { transform: translateY(-8px) rotateX(3deg); }

    .tile-deco {
      position: absolute;
      inset: 0;
      opacity: 0.07;
      font-size: 8rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 0.6rem;
      pointer-events: none;
      filter: blur(1px);
      line-height: 1;
    }
    .tile-icon  { font-size: 3.4rem; line-height: 1; position: relative; }
    .tile-title {
      font-family: var(--font-title);
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-align: center;
      position: relative;
    }
    .tile-sub {
      font-size: 0.74rem;
      color: var(--cream-dim);
      font-family: var(--font-body);
      text-align: center;
      letter-spacing: 0.04em;
      position: relative;
    }
    .tile-badge {
      position: absolute;
      top: 0.7rem; right: 0.7rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-size: 0.62rem;
      font-weight: 700;
      font-family: var(--font-body);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge-speed  { background: rgba(245,166,35,0.15); border: 1px solid var(--card-border); color: var(--gold-bright); }
    .badge-danger { background: rgba(192,57,43,0.22);  border: 1px solid rgba(192,57,43,0.6); color: #f87171; }
    .hub-frame-inner { padding: 2rem 1.8rem; }
  </style>
</head>
<body>

  <header class="top-bar">
    <a href="../index.html" class="btn-back">← Casino</a>
    <span class="top-bar-title">BLACKJACK</span>
    <span></span>
  </header>

  <div class="hub-wrap">
    <div class="vegas-frame">
      <div class="bulbs-container" id="bulbs"></div>
      <div class="hub-frame-inner">
        <p class="hub-subtitle">Réponds juste — et que la chance sourie à ton calcul.</p>
        <div class="variants-grid" id="grid"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { buildBulbs } from '../shared.js';

    const VARIANTS = [
      {
        id: 'classique', icon: '🃏', deco: '♠',
        title: 'Classique',
        sub: '1 joueur vs croupier · rythme normal',
        bg: 'rgba(10,37,64,0.92)', border: 'rgba(245,166,35,0.6)',
        badge: null,
      },
      {
        id: 'fast', icon: '⚡', deco: '⏱',
        title: 'Fast',
        sub: 'Chrono visible · questions instantanées',
        bg: 'rgba(18,8,45,0.94)', border: 'rgba(148,100,255,0.6)',
        badge: { text: 'SPEED', cls: 'badge-speed' },
      },
      {
        id: 'highroller', icon: '💰', deco: '💎',
        title: 'High Roller',
        sub: 'Mise min 200 · BJ naturel ×4',
        bg: 'rgba(38,8,8,0.96)', border: 'rgba(192,57,43,0.6)',
        badge: { text: 'DANGER', cls: 'badge-danger' },
      },
    ];

    const grid = document.getElementById('grid');
    VARIANTS.forEach(v => {
      const a = document.createElement('a');
      a.className = 'variant-tile';
      a.href = `game.html?variant=${v.id}`;
      a.style.cssText = `background:${v.bg}; border-color:${v.border};`;
      a.addEventListener('mouseenter', () => a.style.boxShadow = `0 12px 40px ${v.border}`);
      a.addEventListener('mouseleave', () => a.style.boxShadow = '');
      a.innerHTML = `
        <div class="tile-deco">${v.deco}</div>
        ${v.badge ? `<span class="tile-badge ${v.badge.cls}">${v.badge.text}</span>` : ''}
        <span class="tile-icon">${v.icon}</span>
        <span class="tile-title">${v.title}</span>
        <span class="tile-sub">${v.sub}</span>
      `;
      grid.appendChild(a);
    });

    buildBulbs(document.getElementById('bulbs'), document.querySelector('.vegas-frame'));
  </script>

</body>
</html>
